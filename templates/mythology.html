{% extends 'base.html' %}

{% block content %}
<style>
.timeline {
    position: relative;
    max-width: 1000px;
    margin: 0 auto;
    padding: 40px 0;
}

.timeline-title {
    text-align: center;
    margin-bottom: 40px;
}

/* центральная линия */
.timeline-line {
    position: absolute;
    left: 50%;
    top: 0;
    width: 4px;
    height: 100%;
    background: #bfe29c;
    transform: translateX(-50%);
}

.timeline-link {
    text-decoration: none;
    color: inherit;
}

/* общий блок */
.timeline-item {
    position: relative;
    width: 50%;
    padding: 20px 40px;
}

/* карточки */
.timeline-content {
    background: #1e1e1e;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.timeline-content img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* ЛЕВАЯ сторона */
.timeline-item.left {
    left: 0;
    text-align: right;
}

/* ПРАВАЯ сторона */
.timeline-item.right {
    left: 50%;
}

/* точки на линии */
.timeline-item::before {
    content: '';
    position: absolute;
    top: 30px;
    width: 12px;
    height: 12px;
    background: white;
    border-radius: 50%;
    z-index: 1;
}

/* точки слева */
.timeline-item.left::before {
    right: -6px;
}

/* точки справа */
.timeline-item.right::before {
    left: -6px;
}
h2 {
    color: #bfe29c;
}
.timeline-body {
    position: relative;
}

</style>

<div class="timeline">

    <h1 class="timeline-title">Мифология</h1>
 <div class="timeline-body">
    <div class="timeline-line"></div>

        {% for episode in episodes %}
        <div class="timeline-item {% if forloop.counter0|divisibleby:2 %}left{% else %}right{% endif %}">

            <a href="{% url 'episode_detail' episode.season episode.episode_number %}" class="timeline-link">

                <div class="episode-card">

                    <h2 class="episode-title">{{ episode.title }}</h2>

                    {% if episode.image %}
                        <img src="{{ episode.image.url }}" alt="{{ episode.title }}">
                    {% endif %}

                    <p>{{ episode.short_description }}</p>

                </div>

            </a>

        </div>

        {% endfor %}
    </div>

</div>
{% endblock %}
